<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#5c3d1e" stroke-width="4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#5c3d1e" stroke-width="1.5"/>

  <!-- Top banner arc background -->
  <path d="M 30 70 A 75 75 0 0 1 170 70" fill="#5c3d1e"/>

  <!-- VAR text -->
  <text x="100" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f5e6c8" letter-spacing="6">VAR</text>

  <!-- Football / soccer ball in center -->
  <circle cx="100" cy="115" r="32" fill="none" stroke="#5c3d1e" stroke-width="3"/>
  <!-- Pentagon patches -->
  <polygon points="100,90 112,99 108,113 92,113 88,99" fill="#5c3d1e"/>
  <polygon points="100,90 88,99 78,90 82,76 118,76 122,90 112,99" fill="none" stroke="#5c3d1e" stroke-width="1.5"/>
  <line x1="100" y1="83" x2="100" y2="90" stroke="#5c3d1e" stroke-width="1.5"/>
  <line x1="88" y1="99" x2="80" y2="104" stroke="#5c3d1e" stroke-width="1.5"/>
  <line x1="112" y1="99" x2="120" y2="104" stroke="#5c3d1e" stroke-width="1.5"/>
  <line x1="92" y1="113" x2="88" y2="122" stroke="#5c3d1e" stroke-width="1.5"/>
  <line x1="108" y1="113" x2="112" y2="122" stroke="#5c3d1e" stroke-width="1.5"/>

  <!-- Laurel / decorative band bottom -->
  <path d="M 28 148 Q 100 168 172 148" fill="none" stroke="#5c3d1e" stroke-width="3"/>
  <path d="M 35 155 Q 100 178 165 155" fill="none" stroke="#5c3d1e" stroke-width="1.5"/>

  <!-- Small dots decoration -->
  <circle cx="50" cy="148" r="2.5" fill="#5c3d1e"/>
  <circle cx="150" cy="148" r="2.5" fill="#5c3d1e"/>
  <circle cx="100" cy="162" r="2.5" fill="#5c3d1e"/>
</svg>
